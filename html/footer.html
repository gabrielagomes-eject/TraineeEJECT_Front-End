<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/footer.css">
    <title>Roda pé - Theka</title>
</head>
<body>
    <footer>
        <div class="container_footer">
            <div class="logoFooter">
                <img src="../imagens/LogoTipo_rosa.png" alt="">
                <p>Aventuras literárias</p>
            </div>
            <div class="container_contato_redes_ajuda">
                <h2 class="subtituloFooter">Contato</h2>
                <ol class="listasFooter">
                    <li class="itensLista_footer"><img src="../imagens/Icone_Cel.png" alt=""><p>(84) 9 9999-2222</p></li>
                    <li class="itensLista_footer"><img src="../imagens/Icone_Site.png" alt=""><p>www.theka.com.br</p></li>
                    <li class="itensLista_footer"><img src="../imagens/Icone_Loc.png" alt=""><p>Natal, RN</p></li>
                </ol>
            </div>
            <div class="container_contato_redes_ajuda">
                <h2 class="subtituloFooter">Redes sociais</h2>
                <ol class="listasFooter">
                    <li class="itensLista_footer"><img src="../imagens/Icone_insta.png" alt="Logo da rede social Instagram"><p>@theka.biblioteca</p></li>
                    <li class="itensLista_footer"><img src="../imagens/Icone_tiktok.png" alt="Logo da rede social Tiktok"><p>@theka.biblioteca</p></li>
                    <li class="itensLista_footer"><img src="../imagens/Icone_X.png" alt="Logo da rede social X"><p>@theka.biblioteca</p></li>
                </ol>
            </div>
            <div class="container_contato_redes_ajuda">
                <h2 class="subtituloFooter">Ajuda</h2>
                <ol class="listasFooter">
                    <li class="itensLista_footer"><img src="../imagens/Icone_ajuda.png" alt=""><p>Central de ajuda</p></li>
                    <li class="itensLista_footer"><img src="../imagens/Icone_FAQ.png" alt=""><p>FAQ</p></li>
                </ol>
            </div>  
        </div>
        <p id="EJECT">Mockup desenvolvido por EJECT</p>
    </footer>
</body>
</html>
