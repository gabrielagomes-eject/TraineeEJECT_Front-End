<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/index.css">
    <title>Recuperar senha - Theka</title>
</head>
<body>
    <main class="Login_Cadastro_RecuperacaoDeSenha">
        <section class="secao_imagem_Login_Cadastro_RecuperacaoDeSenha">
            <img class="Mascote_RecuperacaoDeSenha" src="../imagens/Mascote_laranja.png" alt="">
            <img class="LogoTipo_Login_Cadastro_RecuperacaoDeSenha" src="../imagens/LogoTipo_laranja.png" alt="">
        </section>
        <section class="secao_formulario_Login_Cadastro_RecuperacaoDeSenha">
            <div class="container_formulario_Login_Cadastro_RecuperacaoSenha">
                <h1 class="Login_Cadastro_RecuperacaoDeSenha_TextoDestaque">Recuperar Senha</h1>
                <form action="#" method="post" class="Formulario_Login_Cadastro_RecuperacaoSenha">
                    <div class="Rotulo_Formulario_Login_Cadastro_RecuperacaoDeSenha">
                        <label for="senha_nova">Nova senha</label>
                        <input class="Input_RecuperacaoDeSenha" type="password" name="senha" id="senha_nova" required>
                    </div>
                    <div class="Rotulo_Formulario_Login_Cadastro_RecuperacaoDeSenha">
                        <label for="senha_nova">Confirmar nova senha</label>
                        <input class="Input_RecuperacaoDeSenha" type="password" name="senha" id="senha_nova" required>
                    </div>
                    <div class="Botoes_RecuperacaoDeSenha_Cadastro">
                        <button class="Botao_Voltar_RecuperacaoDeSenha"><a href="#">Voltar</a></button>
                        <button class="Botao_Enviar_RecuperacaoDeSenha" type="submit">Enviar</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
