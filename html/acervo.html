<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/index.css">
    <link rel="stylesheet" href="../style/footer.css">
    <link rel="stylesheet" href="../style/header.css">
    <title>Acervo - Theka</title>
</head>
<body>
    <iframe id="frameHeader" src="../html/header.html" width="100%" frameborder="0"></iframe>
    <main>
        <section class="novidadesDaSemana">
            <div>
                <p class="textoDestaqueCarrosselAcervo">Novidades <br> da <br> semana</p> 
                <div class="tituloDescricao_livro">
                    <h2 class="tituloLivro">Título do livro</h2>
                    <h4 class="autorLivro">Autor do livro</h4>
                </div>
            </div>
            <div class="livroNovidadesSemana">
                <img class="capaLivro" src="../imagens/CAPA LIVRO.png" alt="">
                <img class="setaCapaLivro" src="../imagens/Icone_setaLivros.png" alt="">
            </div>
        </section>
        <section>
            <div class="containerFiltroAcervo">
                <h1 class="textoDestaqueH1">Veja nosso catálogo</h1>
                <div class="filtroAcervo">
                    <p class="textoFilto">Fazer busca</p>
                    <div class="botoes_FiltroAcervo">
                        <button class="botao_FiltoCategoria"><p>Gênero</p><img src="../imagens/Icone_filtroCategoriaGenero.png" alt=""></button>
                        <button class="botao_FiltoCategoria"><p>Editora</p><img src="../imagens/Icone_filtroCategoriaEditora.png" alt=""></button>
                        <button class="botao_FiltroBuscar"><p>Buscar</p><img src="../imagens/Icone_pesquisa.png" alt=""></button>
                    </div>
                </div>
            </div>
            <div class="livrosAcervo">
                <img src="../imagens/CAPA LIVRO.png" alt="">
                <img src="../imagens/CAPA LIVRO.png" alt="">
                <img src="../imagens/CAPA LIVRO.png" alt="">
                <img src="../imagens/CAPA LIVRO.png" alt="">
                <img src="../imagens/CAPA LIVRO.png" alt="">
                <img src="../imagens/CAPA LIVRO.png" alt="">
                <img src="../imagens/CAPA LIVRO.png" alt="">
                <img src="../imagens/CAPA LIVRO.png" alt="">
                <dialog class="modalLivroAcervo">
                    <img src="#" alt="">
                    <div>
                        <div>
                            <h2 class="tituloLivro">Título do livro</h2>
                            <h4 class="autorLivro">Descrição do livro</h4>
                        </div>
                        <div>
                            <p class="descricaoLivro">Descrição do Livro</p>
                        </div>
                        <p class="numeroPaginas">Número de páginas</p>
                        <p class="editoraLivro">Editora do livro</p>
                    </div>
                </dialog>
            </div>
            <div class="passarPagina">
                <img src="../imagens/Seta_Esquerda.png" alt="">
                <p class="numerosPassar">1</p>
                <div class="numeroPassar2"><p>2</p></div>
                <p class="numerosPassar">3</p>
                <img src="../imagens/Seta_Direita.png" alt="">
            </div>
        </section>
    </main>
    <iframe id="frameFooter" src="../html/footer.html" width="100%"  frameborder="0"></iframe>
</body>
</html>
