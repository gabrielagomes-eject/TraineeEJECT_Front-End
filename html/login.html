<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/index.css">
    <title>Login - Theka</title>
</head>
<body>
    <main class="Login_Cadastro_RecuperacaoDeSenha">
        <section class="secao_imagem_Login_Cadastro_RecuperacaoDeSenha">
            <img id="Mascote_Login" src="../imagens/Mascote_laranja.png" alt="">
            <img class="LogoTipo_Login_Cadastro_RecuperacaoDeSenha" src="../imagens/LogoTipo_laranja.png" alt="">
        </section>
        <section class="secao_formulario_Login_Cadastro_RecuperacaoDeSenha">
            <div class="formulario_Login_Cadastro_RecuperacaoSenha">
                <h1 class="Login_Cadastro_RecuperacaoDeSenha_TextoDestaque">Login</h1>
                <form action="#" method="post">
                    <div class="Rotulo_Formulario">
                        <label for="email">E-mail</label>
                        <input type="email" name="email" id="email" placeholder="seuemail@email.com" required>
                    </div>
                    <div class="Rotulo_Formulario">
                        <label for="senha">Senha</label>
                        <input type="password" name="senha" id="senha" required>
                    </div>
            
                    <div id="Links_Login">
                        <p><a href="#" class="Links_RecuperacaoDeAcesso">Esqueceu a senha?</a></p>
                        <p><a href="#" class="Links_RecuperacaoDeAcesso">Ainda não tem cadastro</a></p>
                    </div>

                    <button id="Botao_Login" type="submit">Entrar</button>
                </form>
            </div>   
        </section>
    </main>
</body>
</html>
