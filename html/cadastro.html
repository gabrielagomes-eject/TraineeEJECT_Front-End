<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/index.css">
    <title>Cadastro - Theka</title>
</head>
<body>
    <main class="Login_Cadastro_RecuperacaoDeSenha">
        <section class="secao_imagem_Login_Cadastro_RecuperacaoDeSenha">
            <img class="Mascote_Cadastro" src="../imagens/Mascote_laranja.png" alt="">
            <img class="LogoTipo_Login_Cadastro_RecuperacaoDeSenha" src="../imagens/LogoTipo_laranja.png" alt="">
        </section>
        <section class="secao_formulario_Login_Cadastro_RecuperacaoDeSenha">
            <div class="formulario_Login_Cadastro_RecuperacaoSenha">
                <h1 class="Login_Cadastro_RecuperacaoDeSenha_TextoDestaque">Cadastro</h1>
                <form action="#" method="post">
                    <div class="Rotulo_Formulario">
                        <label for="nome">Nome completo</label>
                        <input type="text" name="nome" id="nome" placeholder="Seu nome completo">
                    </div>

                    <div class="Rotulo_Formulario">
                        <label for="email">E-mail</label>
                        <input type="email" name="email" id="email" placeholder="seuemail@email.com" required>
                    </div>

                    <div class="Rotulo_Formulario">
                        <label for="senha">Senha</label>
                        <input type="password" name="senha" id="senha" required> 
                    </div> 

                    <div class="Rotulo_Formulario">
                        <label for="senha">Confirmar senha</label>
                        <input type="password" name="senha" id="senha" required>
                    </div>  

                    <div class="Botoes_RecuperacaoDeSenha_Cadastro">
                        <button id="Botao_Cancelar_Cadastro" type="reset">Cancelar</button>
                        <button id="Botao_Salvar_Cadastro" type="submit">Salvar</button>
                    </div>         
                </form>
            </div>  
        </section>
    </main>
</body>
</html>
