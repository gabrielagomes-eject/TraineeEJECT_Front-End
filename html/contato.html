<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/index.css">
    <title>Contato - Theka</title>
</head>
<body>
    <main>
        <section id="Contato">
            <h1 id="TextoDestaque_Contato">Contato</h1>
           
            <div id="container_Contato">
                <div id="container_ContatoLocalizacao">
                    <iframe src="https://maps.app.goo.gl/A1qN6xjAsSVuEfdLA" frameborder="0"></iframe>
                    <div id="container_Contato_BotoesUnidades">
                        <button id="Botao_Unidade_NatalShopping">Unidades Natal Shopping</button>
                        <button id="Botao_Unidade_Midway">Unidades Midway</button>
                        <p id="endereco_Contato_Unidades">Endereço</p>
                    </div>
                </div>
                <div id="container_ContatoFormulario">
                    <h3 id="TextoDestaque_Formulario_Contato">Vem falar com a gente!</h3>
                    <form action="post" id="Formulario_Contato">
                        <div class="Rotulo_Formulario_Contato">
                            <label for="nome">Seu nome</label>
                            <input class="entrada_Contato" type="text" name="nome" id="nome">
                        </div>
                        <div class="Rotulo_Formulario_Contato">
                            <label for="idade">Idade</label>
                            <input class="entrada_Contato" type="number" name="idade" id="idade">
                        </div>
                        <div class="Rotulo_Formulario_Contato">
                            <label for="email">E-mail</label>
                            <input class="entrada_Contato" type="email" name="email" id="email">
                        </div>
                        <div class="Rotulo_Formulario_Contato">
                            <label for="mensagem">Mensagem</label>
                            <input class="entrada_Contato" type="text" name="mensagem" id="mensagem">
                        </div>
                        <div class="Botoes_Formulario_Contato">
                            <button id="Botao_Enviar_Contato" type="submit">Enviar <img src="../imagens/Icone_Seta.png" alt=""></button>
                            <button id="Botao_Cancelar_Contato" type="reset">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
